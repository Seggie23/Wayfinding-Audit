<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TDC Wayfinding Audit</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f2f2f7; color: #1a1a1a; padding: 16px; font-size: 16px; }
.wrap { max-width: 440px; margin: 0 auto; }
.screen { display: none; }
.screen.active { display: block; }
h1 { font-size: 18px; font-weight: 700; }
input[type=text], textarea {
  display: block; width: 100%; padding: 12px 14px; font-size: 16px;
  border: 1px solid #c7c7cc; border-radius: 10px; background: #fff;
  font-family: inherit; color: #1a1a1a; outline: none;
  -webkit-appearance: none; appearance: none;
}
textarea { resize: vertical; min-height: 60px; }
input:focus, textarea:focus { border-color: #007aff; }
.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 15px 16px; font-size: 16px; font-weight: 600;
  border-radius: 12px; border: 1.5px solid #c7c7cc; background: #fff;
  color: #1a1a1a; cursor: pointer; min-height: 52px; font-family: inherit;
  -webkit-appearance: none; appearance: none;
}
.btn:active { opacity: 0.6; }
.btn-green { background: #34c759; color: #fff; border-color: #28a745; }
.btn-blue  { background: #007aff; color: #fff; border-color: #0062cc; }
.btn-red   { background: #ff3b30; color: #fff; border-color: #d93025; }
.btn-sel-fix { background: #007aff; color: #fff; border-color: #0062cc; }
.btn-sel-new { background: #34c759; color: #fff; border-color: #28a745; }
.mode-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.row2 { display: flex; gap: 10px; margin-top: 6px; }
.row2 > * { flex: 1; }
.field { margin-bottom: 14px; }
.flabel { font-size: 12px; font-weight: 700; color: #8e8e93; letter-spacing: 0.05em; text-transform: uppercase; display: block; margin-bottom: 6px; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.hicon { width: 40px; height: 40px; background: #e5e5ea; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.photo-label {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 18px; border-radius: 12px;
  border: 2px dashed #c7c7cc; background: #f9f9f9;
  font-size: 16px; font-weight: 500; color: #555; cursor: pointer;
  margin-bottom: 14px; min-height: 62px; position: relative;
}
.photo-label:active { background: #efefef; }
.photo-label input[type=file] {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  opacity: 0; cursor: pointer; font-size: 16px;
}
.preview-wrap { position: relative; margin-bottom: 14px; }
.preview-wrap img { width: 100%; border-radius: 12px; border: 1px solid #ddd; display: block; }
.remove-btn {
  position: absolute; top: 10px; right: 10px; width: 34px; height: 34px;
  border-radius: 50%; background: rgba(255,255,255,0.95); border: 1px solid #ddd;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-family: inherit;
}
.badge { display: inline-block; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
.b-fix  { background: #fff3cd; color: #7d5a00; }
.b-new  { background: #e8f0fe; color: #1a56b8; }
.b-move { background: #fde8f0; color: #9b1a5e; }
.log-card { background: #fff; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid #e5e5ea; }
.log-thumb { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; border: 1px solid #eee; flex-shrink: 0; }
.sec-head { font-size: 11px; font-weight: 700; color: #8e8e93; letter-spacing: 0.06em; text-transform: uppercase; padding: 8px 0 6px; border-bottom: 1px solid #e5e5ea; margin-bottom: 10px; margin-top: 6px; }
.empty { text-align: center; padding: 48px 16px; color: #aaa; font-size: 15px; }
.back-btn { background: none; border: none; color: #007aff; font-size: 16px; cursor: pointer; padding: 4px 2px; font-family: inherit; font-weight: 500; }
.edit-btn { background: none; border: 1px solid #c7c7cc; color: #007aff; font-size: 13px; font-weight: 600; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-family: inherit; }
.edit-btn:active { opacity: 0.6; }
.pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.pill { padding: 8px 14px; border-radius: 20px; border: 1.5px solid #c7c7cc; background: #fff; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; color: #1a1a1a; }
.pill:active { opacity: 0.6; }
.pill-sel { background: #007aff; color: #fff; border-color: #007aff; }
.pill-sel-move { background: #d63384; color: #fff; border-color: #d63384; }
.divider { border: none; border-top: 1px solid #e5e5ea; margin: 16px 0; }
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  padding: 12px 20px; border-radius: 24px; font-size: 14px; font-weight: 600;
  color: #fff; z-index: 999; display: none; white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
}
.toast-ok  { background: #34c759; }
.toast-err { background: #ff3b30; }
.toast-wait { background: #8e8e93; }
</style>
</head>
<body>
<div class="wrap">

<!-- CAPTURE -->
<div id="screen-capture" class="screen active">
  <div class="header">
    <div class="hicon">🔍</div>
    <div style="flex:1;">
      <h1>TDC Wayfinding</h1>
      <p id="log-count" style="font-size:13px;color:#8e8e93;">0 items logged</p>
    </div>
    <button class="btn" onclick="showLog()" style="width:auto;padding:10px 14px;font-size:14px;">📋 Log</button>
  </div>

  <div class="mode-row">
    <button id="btn-fix" class="btn btn-sel-fix" onclick="setMode('fix')">⚠️ Fix existing</button>
    <button id="btn-new" class="btn" onclick="setMode('new')">＋ New sign</button>
  </div>

  <div id="preview-wrap" class="preview-wrap" style="display:none;">
    <img id="preview-img" alt="Preview">
    <button class="remove-btn" onclick="clearPhoto()">✕</button>
  </div>
  <label class="photo-label">
    <span style="font-size:26px;pointer-events:none;">📷</span>
    <span id="photo-label-text" style="pointer-events:none;">Take or choose photo of sign</span>
    <input type="file" accept="image/*" id="file-input" onchange="handleFile(event)">
  </label>

  <div class="field"><label class="flabel">Grouping</label><input type="text" id="grouping-input" placeholder="e.g. Gate 5, Floor Access, Concourse B"></div>
  <div class="field"><label class="flabel">Location</label><input type="text" id="location-input" placeholder="e.g. L1, Section 115A, North entrance"></div>
  <div class="field"><label class="flabel">Arrow direction</label><input type="text" id="arrow-input" placeholder="e.g. Left, right, straight, none"></div>
  <div class="field"><label class="flabel">Notes</label><textarea id="notes-input" placeholder="e.g. Needs to move to west wall…"></textarea></div>
  <div class="field">
    <label class="flabel">New copy <span style="font-weight:400;color:#bbb;text-transform:none;letter-spacing:0;">— leave blank, fill in during review</span></label>
    <textarea id="new-copy-input" placeholder="Write approved copy once reviewed…"></textarea>
  </div>

  <button class="btn btn-green" id="log-btn" onclick="logItem()" style="margin-top:4px;">✓ Log &amp; next sign</button>
</div>

<!-- LOG -->
<div id="screen-log" class="screen">
  <div class="header">
    <button class="back-btn" onclick="showCapture()">← Back</button>
    <h1 style="flex:1;">Issue log</h1>
    <a href="https://docs.google.com/spreadsheets/d/1vjDfGgOn7nxcOiv37xNyPbTrBjCfnlGyJeSZRNBNiGs/edit" target="_blank" style="font-size:13px;color:#007aff;font-weight:600;text-decoration:none;white-space:nowrap;">Open Sheet ↗</a>
  </div>
  <div id="log-loading" style="text-align:center;padding:40px 16px;color:#aaa;font-size:14px;">⏳ Loading from Google Sheets…</div>
  <div id="log-list"></div>
  <div id="log-empty" class="empty" style="display:none;">
    <div style="font-size:44px;margin-bottom:12px;">📋</div>
    No items logged yet
  </div>
</div>

<!-- EDIT -->
<div id="screen-edit" class="screen">
  <div class="header">
    <button class="back-btn" onclick="cancelEdit()">← Back</button>
    <h1 style="flex:1;">Edit entry</h1>
  </div>
  <div id="edit-preview-wrap" class="preview-wrap" style="display:none;">
    <img id="edit-preview-img" alt="Preview">
    <button class="remove-btn" onclick="clearEditPhoto()">✕</button>
  </div>
  <label class="photo-label">
    <span style="font-size:26px;pointer-events:none;">📷</span>
    <span style="pointer-events:none;">Replace photo</span>
    <input type="file" accept="image/*" id="edit-file-input" onchange="handleEditFile(event)">
  </label>
  <div class="field"><label class="flabel">Grouping</label><input type="text" id="edit-grouping"></div>
  <div class="field"><label class="flabel">Location</label><input type="text" id="edit-location"></div>
  <div class="field"><label class="flabel">Arrow direction</label><input type="text" id="edit-arrow"></div>
  <div class="field"><label class="flabel">Notes</label><textarea id="edit-notes"></textarea></div>
  <div class="field"><label class="flabel">New copy</label><textarea id="edit-new-copy" placeholder="Write approved copy once reviewed…"></textarea></div>
  <hr class="divider">
  <div class="row2">
    <button class="btn btn-red" onclick="deleteEntry()">🗑 Delete</button>
    <button class="btn btn-green" onclick="saveEdit()">✓ Save changes</button>
  </div>
</div>

</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyH402lSya9tqecFV6uKPMRVqVj5TEQ2GUQyu__cRJ8b2xgREEgE5f981ZFRGCrm-VW/exec';

var currentMode = 'fix';
var currentBase64 = null;
var issueLog = [];
var editIndex = -1;
var editBase64 = null;
var toastTimer = null;

// ── Toast ──
function toast(type, msg, duration) {
  var el = document.getElementById('toast');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  el.style.display = 'block';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.style.display='none'; }, duration || 3000);
}

// ── Screens ──
function show(id) {
  var screens = document.querySelectorAll('.screen');
  for (var i=0;i<screens.length;i++) screens[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showCapture() { show('screen-capture'); }
function showLog() { show('screen-log'); loadFromSheet(); }
function cancelEdit() { editIndex=-1; showLog(); }

// ── Mode ──
function setMode(mode) {
  currentMode = mode;
  var fb=document.getElementById('btn-fix'), nb=document.getElementById('btn-new');
  var pl=document.getElementById('photo-label-text');
  if (mode==='fix') {
    fb.className='btn btn-sel-fix'; nb.className='btn';
    pl.textContent='Take or choose photo of sign';
  } else {
    nb.className='btn btn-sel-new'; fb.className='btn';
    pl.textContent='Take or choose photo of location';
  }
}

// ── Pills ──
function togglePill(el, val) {
  var idx=selectedPills.indexOf(val);
  if (idx>-1) { selectedPills.splice(idx,1); el.className='pill'; }
  else { selectedPills.push(val); el.className=val==='Move sign'?'pill pill-sel-move':'pill pill-sel'; }
}
function toggleEditPill(el, val) {
  var idx=editPills.indexOf(val);
  if (idx>-1) { editPills.splice(idx,1); el.className='pill'; }
  else { editPills.push(val); el.className=val==='Move sign'?'pill pill-sel-move':'pill pill-sel'; }
}

// ── Photo ──
function handleFile(e) {
  var f=e.target.files&&e.target.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(ev){
    currentBase64=ev.target.result;
    document.getElementById('preview-img').src=ev.target.result;
    document.getElementById('preview-wrap').style.display='block';
  };
  r.readAsDataURL(f);
}
function clearPhoto() {
  currentBase64=null;
  document.getElementById('preview-wrap').style.display='none';
  document.getElementById('file-input').value='';
}
function handleEditFile(e) {
  var f=e.target.files&&e.target.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(ev){
    editBase64=ev.target.result;
    document.getElementById('edit-preview-img').src=ev.target.result;
    document.getElementById('edit-preview-wrap').style.display='block';
  };
  r.readAsDataURL(f);
}
function clearEditPhoto() {
  editBase64=null;
  document.getElementById('edit-preview-wrap').style.display='none';
  document.getElementById('edit-file-input').value='';
}

// ── API call via Netlify proxy — no CORS issues ──
function callScript(payload, cb) {
  fetch('/.netlify/functions/proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(function(r) { return r.json(); })
  .then(function(d) { cb(null, d); })
  .catch(function(e) { cb(e, null); });
}

// ── Log item ──
function logItem() {
  var btn = document.getElementById('log-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  toast('wait', '⏳ Saving to Google Sheets…', 30000);

  var rowData = {
    id:       'S'+Date.now(),
    ts:       new Date().toISOString(),
    type:     currentMode==='new'?'New sign needed':'Fix existing',
    grouping: document.getElementById('grouping-input').value.trim(),
    location: document.getElementById('location-input').value.trim(),
    arrow:    document.getElementById('arrow-input').value.trim(),
    notes:    document.getElementById('notes-input').value.trim(),
    newCopy:  document.getElementById('new-copy-input').value.trim()
  };

  function saveRow(photoUrl) {
    var row = [rowData.id, rowData.ts, rowData.type, rowData.grouping, rowData.location, rowData.arrow, rowData.notes, rowData.newCopy, photoUrl||''];
    callScript({ action:'append', row:row }, function(err, data) {
      btn.disabled = false;
      btn.textContent = '✓ Log & next sign';
      if (!err && data && data.status==='ok') {
        toast('ok', '✓ Saved to Google Sheets!');
        var lc = document.getElementById('log-count');
        var n = parseInt(lc.dataset.count||'0') + 1;
        lc.dataset.count = n;
        lc.textContent = n + ' item' + (n!==1?'s':'') + ' logged';
        resetForm();
      } else {
        toast('err', '✗ Save failed — check connection', 5000);
      }
    });
  }

  // If there's a photo, upload it first
  if (currentBase64) {
    toast('wait', '⏳ Uploading photo…', 30000);
    var parts = currentBase64.split(',');
    var mimeType = parts[0].match(/:(.*?);/)[1];
    var imageData = parts[1];
    var fileName = 'photo-' + rowData.id + '.jpg';
    callScript({ action:'uploadPhoto', imageData:imageData, mimeType:mimeType, fileName:fileName }, function(err, data) {
      if (!err && data && data.status==='ok') {
        saveRow(data.photoUrl);
      } else {
        // Photo upload failed — save row without photo
        saveRow('');
      }
    });
  } else {
    saveRow('');
  }
}

function resetForm() {
  clearPhoto();
  selectedPills = [];
  var pills = document.querySelectorAll('#issue-pills .pill');
  for (var i=0;i<pills.length;i++) pills[i].className='pill';
  var fields = ['grouping-input','location-input','arrow-input','notes-input','new-copy-input'];
  for (var j=0;j<fields.length;j++) document.getElementById(fields[j]).value='';
  window.scrollTo(0,0);
}

// ── Load from sheet ──
function loadFromSheet() {
  document.getElementById('log-loading').style.display='block';
  document.getElementById('log-list').innerHTML='';
  document.getElementById('log-empty').style.display='none';

  callScript({ action:'read' }, function(err, data) {
    document.getElementById('log-loading').style.display='none';
    if (err || !data || data.status!=='ok') {
      document.getElementById('log-empty').style.display='block';
      return;
    }
    var rows = data.rows || [];
    // rows[0] is headers, skip it
    issueLog = [];
    for (var i=1;i<rows.length;i++) {
      var r = rows[i];
      if (!r[0]) continue; // skip empty rows
      issueLog.push({
        row_number: i+1,
        id:           r[0]||'',
        timestamp:    r[1]||'',
        type:         r[2]||'',
        grouping:     r[3]||'',
        location:     r[4]||'',
        arrow:        r[5]||'',
        notes:        r[6]||'',
        new_copy:     r[7]||'',
        photo_url:    r[8]||''
      });
    }
    var lc = document.getElementById('log-count');
    lc.dataset.count = issueLog.length;
    lc.textContent = issueLog.length + ' item' + (issueLog.length!==1?'s':'') + ' logged';
    renderLog();
  });
}

// ── Edit ──
function openEdit(idx) {
  editIndex = idx;
  var it = issueLog[idx];
  editBase64 = null;
  editPills = it.issue_type ? it.issue_type.split('; ') : [];

      document.getElementById('edit-grouping').value  = it.grouping;
  document.getElementById('edit-location').value  = it.location;
  document.getElementById('edit-arrow').value     = it.arrow;
  document.getElementById('edit-notes').value     = it.notes;
  document.getElementById('edit-new-copy').value  = it.new_copy;
  document.getElementById('edit-preview-wrap').style.display = 'none';

  var pillBtns = document.querySelectorAll('#edit-issue-pills .pill');
  var pillVals = ['Correction','Move sign','New sign','Remove sign'];
  for (var i=0;i<pillBtns.length;i++) {
    pillBtns[i].className = editPills.indexOf(pillVals[i])>-1
      ? (pillVals[i]==='Move sign'?'pill pill-sel-move':'pill pill-sel') : 'pill';
  }
  show('screen-edit');
}

function saveEdit() {
  if (editIndex<0) return;
  var it = issueLog[editIndex];
  var row = [
    it.id, it.timestamp, it.type,
    document.getElementById('edit-grouping').value.trim(),
    document.getElementById('edit-location').value.trim(),
    document.getElementById('edit-arrow').value.trim(),
    document.getElementById('edit-notes').value.trim(),
    document.getElementById('edit-new-copy').value.trim(),
    it.photo_url||''
  ];
  toast('wait', '⏳ Saving…', 30000);
  callScript({ action:'update', rowNumber:it.row_number, row:row }, function(err, data) {
    if (!err && data && data.status==='ok') {
      toast('ok', '✓ Changes saved');
      editIndex=-1;
      showLog();
    } else {
      toast('err', '✗ Save failed', 5000);
    }
  });
}

function deleteEntry() {
  if (editIndex<0) return;
  if (!confirm('Delete this entry from the sheet?')) return;
  var rowNum = issueLog[editIndex].row_number;
  toast('wait', '⏳ Deleting…', 30000);
  callScript({ action:'delete', rowNumber:rowNum }, function(err, data) {
    if (!err && data && data.status==='ok') {
      toast('ok', '✓ Entry deleted');
      editIndex=-1;
      showLog();
    } else {
      toast('err', '✗ Delete failed', 5000);
    }
  });
}

// ── Render log ──
function renderLog() {
  var list = document.getElementById('log-list');
  var empty = document.getElementById('log-empty');
  if (!issueLog.length) { list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  var grouped = {};
  for (var i=0;i<issueLog.length;i++) {
    var key = issueLog[i].grouping || 'Ungrouped';
    if (!grouped[key]) grouped[key]=[];
    grouped[key].push({item:issueLog[i],idx:i});
  }

  var html = '';
  var keys = Object.keys(grouped).sort();
  for (var k=0;k<keys.length;k++) {
    var grp=keys[k], entries=grouped[grp];
    html += '<div class="sec-head">'+grp+' ('+entries.length+')</div>';
    for (var m=0;m<entries.length;m++) {
      var it=entries[m].item, idx=entries[m].idx;
      var isNew=(it.type||'').indexOf('New')>-1;
      var bc=isNew?'b-new':'b-fix';
      var bl=isNew?'New sign':'Fix existing';
      var time='';
      if (it.timestamp) { try { time=new Date(it.timestamp).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); } catch(e){} }

      html += '<div class="log-card">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">';
      html += '<span class="badge '+bc+'">'+bl+'</span>';
      html += '<button class="edit-btn" onclick="openEdit('+idx+')">✏️ Edit</button>';
      html += '</div>';
      if (time) html += '<p style="font-size:12px;color:#aaa;margin-bottom:4px;">'+time+'</p>';
      if (it.location) html += '<p style="font-size:13px;color:#888;margin-bottom:3px;">📍 '+it.location+'</p>';
      if (it.arrow) html += '<p style="font-size:13px;color:#888;margin-bottom:3px;">Arrow: '+it.arrow+'</p>';
      if (it.photo_url) html += '<a href="'+it.photo_url+'" target="_blank" style="display:inline-block;font-size:13px;color:#007aff;margin-bottom:3px;">📸 View photo</a>';
      if (it.notes) html += '<p style="font-size:13px;color:#666;font-style:italic;margin-bottom:3px;">'+it.notes+'</p>';
      if (it.new_copy) {
        html += '<div style="margin-top:6px;padding:8px 10px;background:#f0faf4;border-radius:8px;border-left:3px solid #34c759;font-size:13px;">';
        html += '<span style="font-size:10px;font-weight:700;color:#888;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:0.04em;">Approved copy</span>';
        html += it.new_copy+'</div>';
      } else {
        html += '<p style="font-size:12px;color:#bbb;font-style:italic;margin-top:4px;">Copy pending review</p>';
      }
      html += '</div>';
    }
  }
  list.innerHTML = html;
}

setMode('fix');
</script>
</body>
</html>
